<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Meals — FoodWasteAI</title>
    <meta name="description" content="Enter daily operational parameters to predict meal demand">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🍽️</span>
            <span class="nav-title">FoodWaste<span class="accent">AI</span></span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/predict" class="nav-link active">Predict</a>
            <a href="/analytics" class="nav-link">Analytics</a>
        </div>
    </nav>

    <section class="form-section">
        <div class="form-container">
            <div class="form-header">
                <div class="form-badge">🎯 Meal Demand Predictor</div>
                <h1>Enter Daily Information</h1>
                <p>Fill in the operational parameters below to get an AI-powered meal demand prediction.</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                <span class="alert-icon">⚠️</span>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/predict" id="predict-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="day">
                            <span class="label-icon">📅</span> Day of Week
                        </label>
                        <select name="day" id="day" required>
                            <option value="" disabled selected>Select day...</option>
                            {% for d in days %}
                            <option value="{{ d }}">{{ d }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="weather">
                            <span class="label-icon">🌤️</span> Weather
                        </label>
                        <select name="weather" id="weather" required>
                            <option value="" disabled selected>Select weather...</option>
                            {% for w in weathers %}
                            <option value="{{ w }}">{{ w }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <span class="label-icon">🎉</span> Festival Day
                        </label>
                        <div class="toggle-group">
                            <label class="toggle-option">
                                <input type="radio" name="festival" value="0" checked>
                                <span class="toggle-label">No</span>
                            </label>
                            <label class="toggle-option">
                                <input type="radio" name="festival" value="1">
                                <span class="toggle-label">Yes</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="expected_customers">
                            <span class="label-icon">👥</span> Expected Customers
                        </label>
                        <input type="number" name="expected_customers" id="expected_customers" min="50" max="1000"
                            placeholder="e.g. 400" required>
                    </div>

                    <div class="form-group">
                        <label for="prev_day">
                            <span class="label-icon">⏮️</span> Previous Day Consumption
                        </label>
                        <input type="number" name="prev_day" id="prev_day" min="0" max="1000" placeholder="e.g. 350"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="prev_week">
                            <span class="label-icon">📆</span> Previous Week Same Day
                        </label>
                        <input type="number" name="prev_week" id="prev_week" min="0" max="1000" placeholder="e.g. 370"
                            required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg" id="btn-predict">
                        <span class="btn-icon">🔮</span> Predict Meals
                    </button>
                </div>
            </form>

            <div class="smart-tip" id="smart-tip" style="display:none;">
                <span class="tip-icon">💡</span>
                <span class="tip-text" id="tip-text"></span>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>Smart Food Waste Prediction System &copy; 2026</p>
    </footer>

    <script>
        // Dynamic smart tips based on input
        const tips = {
            'Rainy': 'Rainy weather usually reduces dining demand by ~25%.',
            'Stormy': 'Stormy conditions can cut demand by up to 40%.',
            'Friday': 'Demand is usually higher on Fridays.',
            'Saturday': 'Weekend days often show different consumption patterns.',
            'Sunday': 'Sunday dining patterns can be unpredictable.',
        };

        function showTip(text) {
            const el = document.getElementById('smart-tip');
            document.getElementById('tip-text').textContent = text;
            el.style.display = 'flex';
            el.classList.add('tip-animate');
        }

        document.getElementById('weather').addEventListener('change', function () {
            if (tips[this.value]) showTip(tips[this.value]);
        });
        document.getElementById('day').addEventListener('change', function () {
            if (tips[this.value]) showTip(tips[this.value]);
        });
    </script>
</body>

</html>
